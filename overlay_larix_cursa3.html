<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>Overlay Larix – Cursa 3 Comarques</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1280px;
  height: 720px;
  background: transparent;
  overflow: hidden;
  position: relative;
  font-family: 'Arial Black', Arial, sans-serif;
}

/* ═══ LOGO – superior esquerra ═══ */
.logo-wrap {
  position: absolute;
  top: 20px;
  left: 24px;
  animation: fadeInLeft 0.7s ease both;
}
.logo-wrap img {
  height: 80px;
  width: auto;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.85));
}

/* ═══ BADGE EN DIRECTE – superior dreta ═══ */
.live-badge {
  position: absolute;
  top: 20px;
  right: 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: #e8192c;
  color: #fff;
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 7px 16px 7px 12px;
  border-radius: 6px;
  box-shadow: 0 2px 16px rgba(232,25,44,0.6);
  animation: fadeInRight 0.7s ease both;
}
.live-dot {
  width: 11px;
  height: 11px;
  background: #fff;
  border-radius: 50%;
  animation: pulse 1.4s ease-in-out infinite;
  flex-shrink: 0;
}

/* ═══ RELLOTGE – sota el badge ═══ */
.clock-wrap {
  position: absolute;
  top: 70px;
  right: 24px;
  text-align: right;
  animation: fadeInRight 0.7s ease 0.1s both;
}
.clock-time {
  font-size: 52px;
  font-weight: 900;
  color: #ffffff;
  letter-spacing: 0.04em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  text-shadow:
    0 0 0 #000,
    2px 2px 0 #000,
    -2px -2px 0 #000,
    2px -2px 0 #000,
    -2px 2px 0 #000,
    0 3px 12px rgba(0,0,0,0.9);
}
.clock-date {
  font-size: 14px;
  font-weight: 700;
  color: rgba(255,255,255,0.80);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 3px;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
  font-family: Arial, sans-serif;
}

/* ═══ BARRA INFERIOR ═══ */
.bottom-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 58px;
  background: linear-gradient(90deg,
    rgba(15,52,28,0.95) 0%,
    rgba(25,72,42,0.92) 50%,
    rgba(15,52,28,0.95) 100%);
  border-top: 2px solid rgba(104,180,46,0.5);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  animation: fadeInUp 0.7s ease 0.2s both;
}
.bar-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.bar-logo {
  height: 34px;
  width: auto;
}
.bar-sep {
  width: 1px;
  height: 26px;
  background: rgba(255,255,255,0.25);
}
.bar-title {
  font-size: 19px;
  font-weight: 900;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 0.07em;
}
.bar-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.65);
  font-family: Arial, sans-serif;
  font-weight: 400;
  margin-left: 4px;
}
.bar-right {
  display: flex;
  align-items: center;
  gap: 18px;
}
.hashtag {
  font-size: 17px;
  font-weight: 700;
  color: rgba(255,255,255,0.78);
  letter-spacing: 0.04em;
}
.yt-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 5px;
  padding: 4px 11px;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.05em;
}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeInLeft {
  from { opacity: 0; transform: translateX(-28px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes fadeInRight {
  from { opacity: 0; transform: translateX(28px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.35; transform: scale(0.72); }
}
</style>
</head>

<script>
const DIES  = ['Diumenge','Dilluns','Dimarts','Dimecres','Dijous','Divendres','Dissabte'];
const MESOS = ['gener','febrer','març','abril','maig','juny','juliol','agost','setembre','octubre','novembre','desembre'];

function pad(n) { return String(n).padStart(2,'0'); }

function update() {
  const now = new Date();
  document.getElementById('clock').textContent =
    pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  document.getElementById('date').textContent =
    DIES[now.getDay()] + ', ' + now.getDate() + ' de ' +
    MESOS[now.getMonth()] + ' de ' + now.getFullYear();
}

update();
setInterval(update, 1000);
</script>
